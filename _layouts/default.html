<!DOCTYPE html>
<html lang="{{ site.lang | default: 'ja' }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="{{ site.title }}">
    <meta property="og:title" content="{{ page.title | default: site.title }}">
    <meta property="og:description" content="{{ page.description | default: site.description }}">
    <meta name="theme-color" content="#7b1f3a">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  </head>
  <body>
    <a class="skip-link" href="#main-content">本文へ移動</a>
    <header class="site-header">
      <div class="container header-inner">
        <div class="brand-block">
          <p class="site-name"><a href="{{ '/' | relative_url }}">{{ site.title }}</a></p>
          <p class="site-tagline">高校スペイン語教育に関わる人のための学びと交流の場</p>
        </div>
        <nav class="site-nav" aria-label="主要メニュー">
          <ul>
            <li><a href="{{ '/' | relative_url }}">ホーム</a></li>
            <li><a href="{{ '/about/' | relative_url }}">会について</a></li>
            <li><a href="{{ '/news/' | relative_url }}">お知らせ</a></li>
            <li><a href="{{ '/events/' | relative_url }}">イベント</a></li>
            <li><a href="{{ '/join-contact/' | relative_url }}">入会・お問い合わせ</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main id="main-content">
      {{ content }}
    </main>

    <footer class="site-footer">
      <div class="container footer-grid">
        <div>
          <p class="footer-title">{{ site.title }}</p>
          <p>高校でスペイン語を教える先生や、これから教師を目指す人に向けて情報を届ける公式サイトです。</p>
        </div>
        <div>
          <p class="footer-title">サイト案内</p>
          <ul>
            <li><a href="{{ '/about/' | relative_url }}">高校スペイン語教師の会とは</a></li>
            <li><a href="{{ '/news/' | relative_url }}">お知らせ</a></li>
            <li><a href="{{ '/events/' | relative_url }}">イベント</a></li>
            <li><a href="{{ '/join-contact/' | relative_url }}">入会・お問い合わせ</a></li>
            <li><a href="{{ '/privacy/' | relative_url }}">プライバシーポリシー</a></li>
          </ul>
        </div>
      </div>
    </footer>
  </body>
</html>
