---
layout: default
---
<article class="page-body">
  <div class="container prose">
    <p class="eyebrow">お知らせ</p>
    <h1>{{ page.title }}</h1>
    <p class="meta">公開日: <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: '%Y年%-m月%-d日' }}</time></p>
    {{ content }}
    <p><a href="{{ '/news/' | relative_url }}">お知らせ一覧へ戻る</a></p>
  </div>
</article>
